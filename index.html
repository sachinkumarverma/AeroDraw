<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AeroDraw — Vivid Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Booting Vivid Engine...</p>
    </div>

    <div id="app">
        <header>
            <div class="logo">AeroDraw <span>PRO</span></div>
        </header>

        <video id="input_video" autoplay playsinline></video>
        <canvas id="feedback-canvas"></canvas>
        <canvas id="drawing-canvas"></canvas>

        <div id="gesture-badge-container">
            <div id="gesture-badge">Ready</div>
        </div>

        <!-- VIVID SIDEBAR -->
        <div id="sidebar">
            <div class="side-group">
                <label>COLORS</label>
                <div class="palette">
                    <div class="color-opt" data-color="#00f2ff" style="background: #00f2ff;"></div>
                    <div class="color-opt active" data-color="#ff00ea" style="background: #ff00ea;"></div>
                    <div class="color-opt" data-color="#39ff14" style="background: #39ff14;"></div>
                    <div class="color-opt" data-color="#ffff00" style="background: #ffff00;"></div>
                    <div class="color-opt" data-color="#ffffff" style="background: #ffffff;"></div>
                </div>
            </div>

            <div class="side-divider"></div>

            <div class="side-group">
                <label>BRUSH</label>
                <input type="range" id="size-slider" min="2" max="40" value="12" />
            </div>

            <div class="side-group">
                <label>CAMERA</label>
                <input type="range" id="opacity-slider" min="0" max="100" value="50" />
            </div>

            <div class="side-divider"></div>

            <div class="side-actions">
                <button id="clear-btn" class="vi-btn" title="Clear">🗑️</button>
                <button id="save-btn" class="vi-btn" title="Download PNG">💾</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script type="module" src="./main.js"></script>
</body>

</html>
